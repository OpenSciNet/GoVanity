name: GoVanity CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        check-latest: true

    - name: Install Dependencies
      # This ensures all external libs (btcec, nostr, crypto) are cached
      run: go mod download

    - name: Build GoVanity
      # This confirms the code actually compiles for Linux
      run: go build -v -o govanity .

    - name: Run Unit Tests
      # This executes all files ending in _test.go
      run: go test -v ./...